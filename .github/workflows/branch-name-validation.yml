name: Branch Name Validation

on:
  push:
    branches-ignore:
      - 'release'
      - 'main'
      - 'master'
      - 'staging'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Branch Name
        run: |
          branch_name=${GITHUB_HEAD_REF}
          if [[ "$branch_name" =~ ^(configure|feat|bug|fix|test)/[0-9]+-[a-zA-Z0-9._-]+$ ]]; then
            echo "Branch name '$branch_name' is valid. Continuing."
          else
            echo "Error: Branch name '$branch_name' does not follow the naming convention."
            echo "Expected format: <issue_type>/<issue_number>-<branch_name>"
            echo "Example: feat/123-add-login-feature"
            exit 1
          fi
